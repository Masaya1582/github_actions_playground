name: test
on: 
  pull_request:
    paths: ['go/**/*.go'] # Goのファイル変更時のみ
jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5 # 言語セットアップ
        with:
          go-version: '1.22'
      - run: go test go/excellent/*.go # テスト実行

# Globの記述例
# go/*.go (goディレクトリ直下で拡張子がgoのファイル)
# go/**/*.go (サブディレクトリを含めた、goディレクトリ配下の全goファイル)
# .github/*.ya?ml (.githubディレクトリ直下で、拡張子がymlまたはyamlのファイル)
# !README.md (README.mdを除外)
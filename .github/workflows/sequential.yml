name: Sequential Jobs
on: push
jobs:
  first:
    runs-on: ubuntu-latest
    steps:
      - run: sleep 10 && echo "First Jos"
  second:
    runs-on: ubuntu-latest
    needs: [first] # needsキーへ依存するfirstジョブのIDを指定
    steps:
      - run: sleep 10 && echo "Second Jos"
  third:
    runs-on: ubuntu-latest
    needs: [second]
    steps:
      - run: sleep 10 && echo "Third Jos"